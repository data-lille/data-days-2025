[build]
  command = "rm -rf .venv && python3 -m venv .venv && .venv/bin/pip install -r requirements.txt && make static"
  publish = "build/"
  environment = { PYTHON_VERSION = "3.12" }

[[redirects]]
  from = "/"
  to = "/2026/"
  status = 302
  force = true

[[redirects]]
  from = "/programme"
  to = "/2026/fr/programme/"
  status = 302
  force = true

[[redirects]]
  from = "/2025/fr/programme/"
  to = "/2026/fr/programme/"
  status = 302
  force = true